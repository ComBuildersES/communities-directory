name: Crear PR desde issue de comunidad

on:
  issues:
    types: [opened, labeled]

jobs:
  create-pr:
    if: contains(github.event.issue.body, 'community-directory-submission:v2') || contains(github.event.issue.labels.*.name, 'nueva-comunidad')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v6

      - name: Configurar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.0.2
          cache: npm

      - name: Instalar dependencias
        run: npm install --ignore-scripts

      - name: Obtener datos del issue
        run: |
          cat <<'EOF' > issue-body.txt
          ${{ github.event.issue.body }}
          EOF

      - name: Resolver responsables
        id: resolve
        run: |
          RESULT=$(node scripts/resolve-issue-assignees.js issue-body.txt)
          echo "result=$RESULT" >> "$GITHUB_OUTPUT"
      
      - name: Generar entrada de comunidad y actualizar JSON
        env:
          GITHUB_ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: node scripts/process-community-issue.js "$(cat issue-body.txt)"
      
      - name: Run process-to-communities-to-geojson script
        run: node scripts/process-to-communities-to-geojson.js

      - name: Validate generated data
        run: npm run validate-data

      - name: Read generated coordinates
        id: coords
        run: |
          COORDS=$(cat .geo/last-coordinates.json)
          LAT=$(echo "$COORDS" | jq -r .lat)
          LON=$(echo "$COORDS" | jq -r .lon)
          echo "LAT=$LAT" >> $GITHUB_OUTPUT
          echo "LON=$LON" >> $GITHUB_OUTPUT
          META=$(cat .geo/community-meta.json)
          COMMUNITY_NAME=$(echo "$META" | jq -r .name)
          COMMUNITY_MODE=$(echo "$META" | jq -r .mode)
          PROPOSAL_EDITOR_URL=$(echo "$META" | jq -r '.proposalEditorUrl // ""')
          echo "PROPOSAL_EDITOR_URL=$PROPOSAL_EDITOR_URL" >> $GITHUB_OUTPUT
          if [ "$COMMUNITY_MODE" = "edit" ]; then
            PR_TITLE="Propuesta: aplicar cambios a $COMMUNITY_NAME (issue #${{ github.event.issue.number }})"
            {
              echo "PR_BODY<<__BODY__"
              echo "Esta PR ha sido generada automáticamente a partir del issue #${{ github.event.issue.number }}."
              echo
              echo "Closes #${{ github.event.issue.number }}"
              echo
              echo "✍️ Seguir mejorando esta propuesta:"
              echo "- [Abrir en el editor con los datos de la propuesta]($PROPOSAL_EDITOR_URL)"
              echo
              echo "📍 Check location on maps:"
              echo "- [OpenStreetMap](https://www.openstreetmap.org/?mlat=$LAT&mlon=$LON&zoom=15)"
              echo "- [Google Maps](https://www.google.com/maps/search/?api=1&query=$LAT,$LON)"
              echo "__BODY__"
            } >> "$GITHUB_OUTPUT"
          elif [ "$COMMUNITY_MODE" = "delete" ]; then
            PR_TITLE="Propuesta: dar de baja $COMMUNITY_NAME (issue #${{ github.event.issue.number }})"
            {
              echo "PR_BODY<<__BODY__"
              echo "Esta PR ha sido generada automáticamente a partir del issue #${{ github.event.issue.number }}."
              echo
              echo "Closes #${{ github.event.issue.number }}"
              echo
              echo "🗑️ Esta propuesta elimina la comunidad del directorio y conserva una traza en \`public/data/deleted-communities.json\`."
              echo "__BODY__"
            } >> "$GITHUB_OUTPUT"
          else
            PR_TITLE="Propuesta: añadir $COMMUNITY_NAME (issue #${{ github.event.issue.number }})"
            {
              echo "PR_BODY<<__BODY__"
              echo "Esta PR ha sido generada automáticamente a partir del issue #${{ github.event.issue.number }}."
              echo
              echo "Closes #${{ github.event.issue.number }}"
              echo
              echo "✍️ Seguir mejorando esta propuesta:"
              echo "- [Abrir en el editor con los datos de la propuesta]($PROPOSAL_EDITOR_URL)"
              echo
              echo "📍 Check location on maps:"
              echo "- [OpenStreetMap](https://www.openstreetmap.org/?mlat=$LAT&mlon=$LON&zoom=15)"
              echo "- [Google Maps](https://www.google.com/maps/search/?api=1&query=$LAT,$LON)"
              echo "__BODY__"
            } >> "$GITHUB_OUTPUT"
          fi
          echo "PR_TITLE=$PR_TITLE" >> $GITHUB_OUTPUT

      - name: Crear Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: |
            public/data/
            public/images/
          commit-message: "Aplicar propuesta de comunidad desde issue #${{ github.event.issue.number }}"
          branch: "community-issue-${{ github.event.issue.number }}"
          title: "${{ steps.coords.outputs.PR_TITLE }}"
          body: ${{ steps.coords.outputs.PR_BODY }}

      - name: Sincronizar responsables en la PR
        if: steps.cpr.outputs.pull-request-number != ''
        uses: actions/github-script@v8
        env:
          RESOLUTION: ${{ steps.resolve.outputs.result }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        with:
          script: |
            const resolution = JSON.parse(process.env.RESOLUTION);
            const pull_number = Number(process.env.PR_NUMBER);
            const normalizeLogin = (value = "") => String(value).trim().toLowerCase();

            if (!pull_number || resolution.assignees.length === 0) {
              return;
            }

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pull_number,
              assignees: resolution.assignees,
            });

            try {
              const requestedReviewers = await github.rest.pulls.listRequestedReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number,
              });

              const existingRequested = new Set(
                requestedReviewers.data.users.map((user) => normalizeLogin(user.login))
              );
              const author = normalizeLogin(context.payload.sender?.login);
              const reviewersToRequest = [];
              const seenReviewers = new Set();

              for (const reviewer of resolution.assignees) {
                const normalizedReviewer = normalizeLogin(reviewer);
                if (!normalizedReviewer || normalizedReviewer === author) continue;
                if (existingRequested.has(normalizedReviewer) || seenReviewers.has(normalizedReviewer)) continue;
                seenReviewers.add(normalizedReviewer);
                reviewersToRequest.push(reviewer);
              }

              for (const reviewer of reviewersToRequest) {
                try {
                  await github.rest.pulls.requestReviewers({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number,
                    reviewers: [reviewer],
                  });
                } catch (error) {
                  core.warning(`No se pudo solicitar review a ${reviewer} en la PR #${pull_number}: ${error.message}`);
                }
              }
            } catch (error) {
              core.warning(`No se pudieron sincronizar reviewers para la PR #${pull_number}: ${error.message}`);
            }

      - name: Publicar resumen del workflow
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          RESOLUTION: ${{ steps.resolve.outputs.result }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          node - <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const resolution = JSON.parse(process.env.RESOLUTION);
          console.log("## PR automática");
          console.log(`- pullRequestNumber: ${process.env.PR_NUMBER}`);
          console.log(`- assignees: ${resolution.assignees.join(", ") || "-"}`);
          console.log(`- usedFallback: ${resolution.usedFallback}`);
          console.log(`- fallbackReason: ${resolution.fallbackReason ?? "-"}`);
          console.log(`- provinceId: ${resolution.provinceId ?? "null"}`);
          NODE
