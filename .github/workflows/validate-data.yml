name: Validate data and build

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.0.2
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Validate communities data
        run: npm run validate-data

      - name: Fetch PR base branch
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.base_ref }} --depth=1

      - name: Validate changed communities against base branch
        if: github.event_name == 'pull_request'
        run: node scripts/validate-community-data.js --strict-changed --baseline-ref origin/${{ github.base_ref }}

      - name: Build the project
        run: npm run build
